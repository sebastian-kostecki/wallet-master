services:
  app:
    build:
      context: .
      dockerfile: docker/8.5/Dockerfile.prod
      args:
        WWWGROUP: ${WWWGROUP:-1000}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-budget.kostecki.dev}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
    image: wallet-master-app:prod
    container_name: wallet-app
    restart: unless-stopped
    environment:
      WWWUSER: ${WWWUSER:-1000}
      SUPERVISOR_PHP_USER: sail
    volumes:
      - ./storage:/var/www/html/storage
      - ./.env:/var/www/html/.env:ro
    networks:
      - wallet-internal
      - proxy
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.wallet.rule=Host(`budget.kostecki.dev`)
      - traefik.http.routers.wallet.priority=1
      - traefik.http.routers.wallet.entrypoints=websecure
      - traefik.http.routers.wallet.tls.certresolver=letsencrypt
      - traefik.http.routers.wallet.service=wallet
      - traefik.http.services.wallet.loadbalancer.server.port=80
      - traefik.http.routers.wallet-ws.rule=Host(`budget.kostecki.dev`) && (PathPrefix(`/app`) || PathPrefix(`/apps`))
      - traefik.http.routers.wallet-ws.priority=100
      - traefik.http.routers.wallet-ws.entrypoints=websecure
      - traefik.http.routers.wallet-ws.tls.certresolver=letsencrypt
      - traefik.http.routers.wallet-ws.service=wallet-ws
      - traefik.http.services.wallet-ws.loadbalancer.server.port=8080
  mysql:
    image: mysql:8.4
    container_name: wallet-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - wallet-mysql:/var/lib/mysql
    networks:
      - wallet-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 5
      timeout: 5s
      interval: 10s

  redis:
    image: redis:alpine
    container_name: wallet-redis
    restart: unless-stopped
    volumes:
      - wallet-redis:/data
    networks:
      - wallet-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 5
      timeout: 5s
      interval: 10s

  typesense:
    image: typesense/typesense:27.1
    container_name: wallet-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /typesense-data
    volumes:
      - wallet-typesense:/typesense-data
    networks:
      - wallet-internal
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/8108 && printf 'GET /health HTTP/1.1\r\nConnection: close\r\n\r\n' >&3 && head -n1 <&3 | grep '200' && exec 3>&-",
        ]
      retries: 5
      timeout: 7s
      interval: 15s

networks:
  wallet-internal:
    driver: bridge
  proxy:
    external: true

volumes:
  wallet-mysql:
  wallet-redis:
  wallet-typesense:
